version: 2

project_name: nest-cli

dist: dist

builds:
  - id: nest
    main: .
    binary: nest
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/abdullahanzar/nest-cli/internal/version.Version={{ .Version }}
        -X github.com/abdullahanzar/nest-cli/internal/version.Commit={{ .Commit }}
        -X github.com/abdullahanzar/nest-cli/internal/version.Date={{ .Date }}

archives:
  - id: nest-archives
    builds:
      - nest
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  prerelease: auto